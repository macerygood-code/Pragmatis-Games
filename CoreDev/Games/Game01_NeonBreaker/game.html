<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Brick Breaker (Pragmatis)</title>
    <!-- 구글 웹폰트 (점수용, 모달용 구분) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="game-container">
        <!-- 상단 정보 UI -->
        <div id="hud">
            <div class="score-board">SCORE : <span id="scoreValue">0</span></div>
            <div class="hud-center-btns">
                <button id="hudPauseBtn" class="hud-pill-btn pause-btn">
                    <span style="font-size: 10px;">❚❚</span> 일시정지 (PAUSE)
                </button>
                <button id="hudLobbyBtn" class="hud-pill-btn lobby-btn">
                    <span style="font-size: 12px;">◀</span> 메인화면으로
                </button>
            </div>
            <div class="lives-board">LIVES : <span id="livesValue">3</span></div>
        </div>

        <!-- 실제 렌더링 도화지 -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- 게임 상태(Start, Over, Win) 알림 모달 -->
        <div id="modalOverlay" class="active">
            <div id="modalContent">
                <h1 id="modalTitle">NEON BREAKER</h1>
                <p id="modalDesc">프라그마티스 아케이드 1호작. 마우스로 바를 이동해 불꽃을 터트리세요!</p>
                <div class="modal-buttons">
                    <button id="startBtn" class="action-btn">게임 시작 (START)</button>
                    <!-- Iframe 안에서 돌아갈 것이므로 닫기(로비 귀환) 버튼은 로비(부모)측에서 주거나, 여기서 메시지를 날립니다. -->
                    <button id="closeBtn" class="action-btn secondary">로비로 나가기</button>
                </div>
            </div>
        </div>

        <!-- 일시정지 오버레이 -->
        <div id="pauseOverlay">
            <div id="modalContent">
                <h1 id="pauseTitle">PAUSED</h1>
                <p id="pauseDesc">잠시 숨을 고르세요. ESC 또는 P를 눌러 재개합니다.</p>
                <div class="modal-buttons">
                    <button id="resumeBtn" class="action-btn">재개 (RESUME)</button>
                    <button id="pauseLobbyBtn" class="action-btn secondary">로비로 나가기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const returnToLobby = () => window.parent.postMessage('backToLobby', '*');
        document.getElementById('closeBtn').addEventListener('click', returnToLobby);
        document.getElementById('pauseLobbyBtn').addEventListener('click', returnToLobby);
        document.getElementById('hudLobbyBtn').addEventListener('click', returnToLobby);
    </script>
    <script src="engine.js"></script>
</body>
</html>

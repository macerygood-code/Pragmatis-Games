<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DEFENDER - KJCOMTECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
/* 기본 설정 */
:root {
    --bg-color: #0b0f19;
    --neon-blue: #00f3ff;
    --neon-pink: #f900bf;
    --glass-bg: rgba(11, 15, 25, 0.7);
    --glass-border: rgba(0, 243, 255, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none; /* 드래그 방지 */
}

body {
    background-color: var(--bg-color);
    color: white;
    font-family: 'Orbitron', '맑은 고딕', sans-serif;
    overflow: hidden; /* 스크롤바 숨김 */
    width: 100vw;
    height: 100vh;
    touch-action: none; /* 모바일 제스처 방지 (더블탭 확대 등) */
}

/* 캔버스 꽉 채우기 */
#gameCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* 상단 HUD UI */
#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
    pointer-events: none; /* 클릭 무시 -> 아래 게임 캔버스로 전달 */
}

.hud-item {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 10px currentColor;
}

.neon-blue { color: var(--neon-blue); }
.neon-pink { color: var(--neon-pink); }
.neon-blue-text { font-size: 1.5rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
.neon-pink-text { font-size: 1.5rem; color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

/* 메인 메뉴 및 게임 오버 오버레이 (글래스모피즘 효과) */
#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    transition: opacity 0.3s ease;
}

/* 오버레이 안쪽 패널 */
.panel {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
    max-width: 90%;
}

.title.neon-text {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--neon-blue);
    margin-bottom: 5px;
    text-shadow: 
        0 0 5px var(--neon-blue),
        0 0 20px var(--neon-blue),
        0 0 40px var(--neon-blue);
}

.subtitle {
    font-size: 1rem;
    color: #a0a0a0;
    letter-spacing: 5px;
    margin-bottom: 30px;
}

.instructions {
    margin: 20px 0;
    font-size: 0.9rem;
    color: #cccccc;
    line-height: 1.8;
}

/* 네온 버튼 */
.neon-btn {
    background: transparent;
    border: 2px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 15px 40px;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    box-shadow: 
        inset 0 0 10px rgba(249, 0, 191, 0.2),
        0 0 10px rgba(249, 0, 191, 0.2);
}

.neon-btn:hover, .neon-btn:active {
    background: var(--neon-pink);
    color: white;
    box-shadow: 
        0 0 10px var(--neon-pink),
        0 0 30px var(--neon-pink);
}

/* 일시정지 오버레이 */
#pauseOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 30;
}

/* Unified HUD Buttons */
.hud-center-btns {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 25;
    pointer-events: auto;
}

.hud-pill-btn {
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 900;
    font-family: 'Orbitron', sans-serif;
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.hud-pill-btn:hover {
    transform: scale(1.1) translateY(-2px);
    filter: brightness(1.2);
}

.hud-pill-btn.pause-btn {
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
}

.hud-pill-btn.lobby-btn {
    background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
    box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
}
    </style>
</head>
<body>
    <!-- 게임 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 인게임 HUD -->
    <div id="hud">
        <div class="hud-left">
            <div class="hud-item neon-blue">SCORE: <span id="scoreVal">0</span></div>
        </div>
        <div class="hud-center-btns">
            <button id="hudPauseBtn" class="hud-pill-btn pause-btn">
                <span style="font-size: 10px;">❚❚</span> PAUSE
            </button>
            <button id="hudLobbyBtn" class="hud-pill-btn lobby-btn">
                <span style="font-size: 12px;">◀</span> LOBBY
            </button>
        </div>
        <div class="hud-right">
            <div class="hud-item neon-pink">LIFE: <span id="lifeContainer"></span></div>
        </div>
    </div>

    <!-- 메인 메뉴 및 게임 오버 화면 (오버레이) -->
    <div id="overlay">
        <div class="panel">
            <h1 class="title neon-text">NEON DEFENDER</h1>
            <p class="subtitle">KJCOMTECH EDITION</p>
            
            <div id="gameOverInfo" style="display: none;">
                <h2 class="neon-pink-text">GAME OVER</h2>
                <p>FINAL SCORE: <span id="finalScore" class="neon-blue-text">0</span></p>
            </div>
            
            <p class="instructions">
                PC: 마우스 드래그로 조작<br>
                MOBILE: 터치 후 드래그로 조작<br>
                가만히 있으면 자동 발사
            </p>
            
            <button id="startBtn" class="neon-btn">SYSTEM START</button>
            <button id="lobbyBtn" class="neon-btn" style="border-color: var(--neon-blue); color: var(--neon-blue); margin-left: 10px;">EXIT TO LOBBY</button>
        </div>
    </div>

    <!-- 일시정지 오버레이 -->
    <div id="pauseOverlay">
        <div class="panel">
            <h1 class="title neon-text" style="font-size: 2rem;">PAUSED</h1>
            <button id="resumeBtn" class="neon-btn">RESUME</button>
            <button id="pauseLobbyBtn" class="neon-btn" style="border-color: var(--neon-blue); color: var(--neon-blue); margin-left: 10px;">EXIT TO LOBBY</button>
        </div>
    </div>

    <script>
const lobbyBtn = document.getElementById('lobbyBtn');
lobbyBtn.addEventListener('click', () => {
    window.parent.postMessage('backToLobby', '*');
});
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI 요소
const scoreEl = document.getElementById('scoreVal');
const lifeEl = document.getElementById('lifeContainer');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const finalScoreEl = document.getElementById('finalScore');
const gameOverInfo = document.getElementById('gameOverInfo');

// 캔버스 크기 조정 함수
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas(); // 초기 크기 지정

// 전역 게임 상태
let score = 0;
let lives = 3;
let isPlaying = false;
let isPaused = false;
let animationId; // requestAnimationFrame ID
const MAX_ENEMIES = 15;

// 오브젝트 배열
let bullets = [];
let enemies = [];
let particles = [];

// 클래스 정의
class Player {
    constructor() {
        this.size = 20; // 기체 반지름 (삼각형)
        this.x = canvas.width / 2;
        this.y = canvas.height - this.size * 3;
        this.color = '#00f3ff';
        this.speed = 5;
        this.fireRate = 12; // 발사 프레임 간격
        this.fireTimer = 0;
    }

    draw() {
        ctx.save();
        ctx.beginPath();
        // 네온 효과
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        // 전투기 모양 (삼각형)
        ctx.moveTo(this.x, this.y - this.size);
        ctx.lineTo(this.x - this.size, this.y + this.size);
        ctx.lineTo(this.x + this.size, this.y + this.size);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    update() {
        // 자동 발사
        if (isPlaying) {
            this.fireTimer++;
            if (this.fireTimer >= this.fireRate) {
                this.shoot();
                this.fireTimer = 0;
            }
        }
    }

    shoot() {
        bullets.push(new Bullet(this.x, this.y - this.size));
    }

    // 마우스/터치에 위치 동기화
    moveTo(tx, ty) {
        // 화면 밖으로 안 나가게 보정
        this.x = Math.max(this.size, Math.min(canvas.width - this.size, tx));
        this.y = Math.max(this.size, Math.min(canvas.height - this.size, ty));
    }
}

class Bullet {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 4;
        this.speed = 10;
        this.color = '#ffffff';
        this.glow = '#00f3ff'; // 총알 오라 색상
    }

    draw() {
        ctx.save();
        ctx.beginPath();
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.glow;
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.y -= this.speed;
    }
}

class Enemy {
    constructor() {
        this.radius = Math.random() * 15 + 15; // 15 ~ 30 크기
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = -this.radius; // 화면 위 밖에서 시작
        // 크기에 반비례하는 속도 (큰 적이 느림)
        this.speed = (35 / this.radius) + (Math.random() * 1.5);
        this.color = '#f900bf'; // 핑크색 적
    }

    draw() {
        ctx.save();
        ctx.beginPath();
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        
        // 다각형 적 그리기 (헥사곤 형태)
        const points = 6;
        for (let i = 0; i < points; i++) {
            const angle = (Math.PI * 2 / points) * i;
            const px = this.x + Math.cos(angle) * this.radius;
            const py = this.y + Math.sin(angle) * this.radius;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();

        // 중앙 코어
        ctx.fillStyle = 'rgba(249, 0, 191, 0.3)';
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.y += this.speed;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 3 + 1;
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 4 + 1;
        this.dx = Math.cos(angle) * velocity;
        this.dy = Math.sin(angle) * velocity;
        this.color = color;
        this.alpha = 1;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.x += this.dx;
        this.y += this.dy;
        this.alpha -= 0.02; // 서서히 사라짐
    }
}

// 인스턴스
let player = new Player();

// 폭발 효과 함수
function createExplosion(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
    }
}

// 충돌 검사 합수 (두 원통 판정)
function checkCollision(x1, y1, r1, x2, y2, r2) {
    const dist = Math.hypot(x1 - x2, y1 - y2);
    return dist < r1 + r2;
}


// 메인 게임 루프
function animate() {
    if (!isPlaying || isPaused) return;
    
    // 약간 잔상을 남기며 그리기
    ctx.fillStyle = 'rgba(11, 15, 25, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 플레이어
    player.update();
    player.draw();

    // 파티클
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // 총알
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.update();
        b.draw();

        // 화면 밖 총알 삭제
        if (b.y < -b.radius) {
            bullets.splice(i, 1);
        }
    }

    // 적 스폰 (랜덤)
    if (Math.random() < 0.03 && enemies.length < MAX_ENEMIES) {
        enemies.push(new Enemy());
    }

    // 적 업데이트 및 충돌 로직
    for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.update();
        enemy.draw();

        // 화면 밖 (아래)으로 벗어나면 라이프 감소
        if (enemy.y > canvas.height + enemy.radius) {
            enemies.splice(i, 1);
            lives--;
            updateHUD();
            
            // 데미지 효과 (화면 뻘겋게)
            ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (lives <= 0) {
                gameOver();
            }
            continue;
        }

        // 플레이어 <-> 적 충돌 검사
        if (checkCollision(player.x, player.y, player.size, enemy.x, enemy.y, enemy.radius)) {
            createExplosion(player.x, player.y, '#ffffff'); // 플레이어 피격 파티클
            enemies.splice(i, 1);
            lives--;
            updateHUD();

            if (lives <= 0) {
                gameOver();
                continue;
            }
        }

        // 총알 <-> 적 충돌 검사
        for (let j = bullets.length - 1; j >= 0; j--) {
            const bullet = bullets[j];
            if (checkCollision(bullet.x, bullet.y, bullet.radius, enemy.x, enemy.y, enemy.radius)) {
                // 파괴됨
                createExplosion(enemy.x, enemy.y, enemy.color);
                
                // 점수 가산 (작은 적이 점수 더 큼)
                score += Math.floor(40 - enemy.radius);
                updateHUD();

                enemies.splice(i, 1);
                bullets.splice(j, 1);
                break; // 적 파괴후 반복 중지 (다음 스텝)
            }
        }
    }

    animationId = requestAnimationFrame(animate);
}

// 조작 이벤트 리스너 세팅
function initControls() {
    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    // 마우스 이벤트 (PC)
    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - player.x;
        offsetY = e.clientY - player.y;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !isPlaying) return;
        player.moveTo(e.clientX - offsetX, e.clientY - offsetY);
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // 터치 이벤트 (모바일) - 모바일은 offset 기반이 아닌 절대위치 터치기반으로.
    canvas.addEventListener('touchstart', (e) => {
        if (!isPlaying) return;
        // 터치 시작 시 그 위치로 스냅하지 않고, 첫 포지션을 기억
        const touch = e.touches[0];
        offsetX = touch.clientX - player.x;
        offsetY = Math.max(0, touch.clientY - player.y); // 손가락이 기체 가리는거 방지용 (아래 터치)
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!isPlaying) return;
        e.preventDefault(); // 화면 스크롤, 줌 등 방지
        const touch = e.touches[0];
        // 손가락에 가리지 않게 살짝 위로 오프셋
        player.moveTo(touch.clientX - offsetX, touch.clientY - offsetY - 50);
    }, {passive: false});

    // 키보드 이벤트 (일시정지용)
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' || e.key === 'Esc' || e.code === 'Escape' || e.key.toLowerCase() === 'p') {
            e.preventDefault();
            togglePause();
        }
    });

    document.getElementById('resumeBtn').addEventListener('click', togglePause);
    document.getElementById('pauseLobbyBtn').addEventListener('click', () => {
        window.parent.postMessage('backToLobby', '*');
    });
    document.getElementById('hudLobbyBtn').addEventListener('click', () => {
        window.parent.postMessage('backToLobby', '*');
    });
    document.getElementById('hudPauseBtn').addEventListener('click', togglePause);
}

function togglePause() {
    if (!isPlaying) return;
    isPaused = !isPaused;
    document.getElementById('pauseOverlay').style.display = isPaused ? 'flex' : 'none';
    if (!isPaused) {
        animate();
    }
}

// HUD 업데이트
function updateHUD() {
    scoreEl.innerText = score;
    // 목숨 ■ 개수로 표현
    let lifeStr = '';
    for(let i=0; i<Math.max(0, lives); i++) lifeStr += '███ ';
    lifeEl.innerText = lifeStr.trim() || 'DEAD';
}

// 게임 시작
function startGame() {
    // 초기화
    score = 0;
    lives = 3;
    bullets = [];
    enemies = [];
    particles = [];
    
    isPaused = false;
    document.getElementById('pauseOverlay').style.display = 'none';
    
    player.x = canvas.width / 2;
    player.y = canvas.height - 100;
    
    updateHUD();
    
    overlay.style.display = 'none'; // 메뉴 가리기
    
    isPlaying = true;
    animate();
}

// 게임 오버
function gameOver() {
    isPlaying = false;
    cancelAnimationFrame(animationId);
    
    finalScoreEl.innerText = score;
    gameOverInfo.style.display = 'block';
    startBtn.innerText = "RESTART SYSTEM";
    
    overlay.style.display = 'flex'; // 메뉴 노출
}

// 초기화 호출
initControls();

// 시작 버튼 클릭
startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
